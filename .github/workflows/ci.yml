# Project Step 1: GitHub Action
# Runs pytest and flake8 on push to main/master. Both must pass.
# Use the same Python version you used in development (3.10).
# At the end of the project, capture a screenshot of the passing workflow
# named continuous_integration.png in the screenshots/ folder.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # TODO (Step 1): Set the Python version to match your development env.
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # TODO (Step 1): flake8 must pass without errors.
      - name: Lint with flake8
        run: flake8 .

      # TODO (Step 1): pytest must pass (at least 3 tests by project end).
      - name: Run tests with pytest
        run: pytest -v
